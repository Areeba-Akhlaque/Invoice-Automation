# DIRECTIVE — laborer roster & per-person billing rules. Derived from DRC-0059 + Cherry.
#
# Rate model is "mixed" (same as the sheet); the duplicate-template preserves each
# row's rate formula, so rates aren't recomputed here. base_rate*markup is only
# used for the dry-run preview.
#   1.2 = 20% markup on cost (Cherry: applies to all contractors; older roster
#   rates already have it baked in -> markup 1.0).
#
# hours_source:
#   fixed   -> 86.5 (173/mo full-time contractor)
#   kimai   -> hours pulled from Kimai (previous complete half-month, advance billing)
#   manual  -> carried over from the previous invoice / set via --manual (James, Bradd, Keeko)
#
# kimai_user_id is used for BOTH hours (kimai source) and pulling timesheet
# descriptions (all who track in Kimai). name MUST match column B of the invoice
# tab (whitespace ignored when matching).

laborers:
