name: DRC Invoice

# Cloud scheduling — runs on GitHub's servers, no laptop needed.
# Cron is UTC. 06:00 UTC on the 7th and 22nd (a day before Cherry issues on 8th/23rd).
# Adjust the times below for your timezone if needed.
on:
  schedule:
    - cron: "0 6 7 * *"    # 7th  -> bills 1-15
    - cron: "0 6 22 * *"   # 22nd -> bills 16-EOM
  workflow_dispatch:        # manual run button
    inputs:
      write:
        description: "Write the tab to the sheet (otherwise preview only)"
        type: boolean
        default: false
      start:
        description: "Period start YYYY-MM-DD (optional; auto from today if blank)"
        required: false
      end:
        description: "Period end YYYY-MM-DD (optional)"
        required: false

jobs:
  build-invoice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Generate invoice
        env:
          KIMAI_URL: ${{ secrets.KIMAI_URL }}
          KIMAI_TOKEN: ${{ secrets.KIMAI_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          ARGS="--yes"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.write }}" = "true" ]; then
            ARGS="$ARGS --write"
          fi
          if [ -n "${{ inputs.start }}" ]; then ARGS="$ARGS --start ${{ inputs.start }}"; fi
          if [ -n "${{ inputs.end }}" ]; then ARGS="$ARGS --end ${{ inputs.end }}"; fi
          echo "Running: python run.py $ARGS"
          python run.py $ARGS
