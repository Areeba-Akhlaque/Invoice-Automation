name: DRC Invoice

# Cloud scheduling — runs on GitHub's servers, no laptop needed.
# Cron is UTC and does NOT observe DST. 17:00 UTC = 9:00 AM PST (winter).
# (In summer / PDT that lands at 10:00 AM; change "17" to "16" if you prefer.)
on:
  schedule:
    - cron: "0 17 7,22 * *"   # 7th & 22nd of every month, 9am PST -> bills 1-15 / 16-EOM
  workflow_dispatch:           # manual "Run workflow" button
    inputs:
      write:
        description: "Write the tab to the sheet (otherwise preview only)"
        type: boolean
        default: false
      start:
        description: "Period start YYYY-MM-DD (optional; auto from today if blank)"
        required: false
      end:
        description: "Period end YYYY-MM-DD (optional)"
        required: false

jobs:
  build-invoice:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Restore Google OAuth token
        run: printf '%s' '${{ secrets.GOOGLE_TOKEN_JSON || secrets.GOOGLE_TOKEN }}' > token.json

      - name: Generate invoice
        env:
          # Accept a few common secret-name variations so naming doesn't break it.
          KIMAI_URL: ${{ secrets.KIMAI_URL || secrets.KIMAI_API_URL }}
          KIMAI_TOKEN: ${{ secrets.KIMAI_TOKEN || secrets.KIMAI_API_TOKEN || secrets.KIMAI_API }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GEMINI_API }}
        run: |
          ARGS="--yes"
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ inputs.write }}" = "true" ]; then
            ARGS="$ARGS --write"
          fi
          if [ -n "${{ inputs.start }}" ]; then ARGS="$ARGS --start ${{ inputs.start }}"; fi
          if [ -n "${{ inputs.end }}" ]; then ARGS="$ARGS --end ${{ inputs.end }}"; fi
          echo "Running: python run.py $ARGS"
          python run.py $ARGS
